name: AccessGuard CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-validate:
    runs-on: ubuntu-latest

    # PostgreSQL database service container for migrations check
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
          POSTGRES_DB: accessguard_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # --- BACKEND VALIDATION ---
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Verify Backend Database Migration
        env:
          DATABASE_URL: "postgresql://postgres:postgres_password@localhost:5433/accessguard_test?schema=public"
        run: |
          cd backend
          npx prisma db push

      - name: Compile Backend TypeScript
        run: |
          cd backend
          npm run build

      # --- FRONTEND VALIDATION ---
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend Static Bundle
        run: |
          cd frontend
          npm run build
