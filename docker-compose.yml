version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: accessguard_db_container
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432" # Host mapping 5433 to avoid port 5432 conflicts on host
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend REST API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: accessguard_backend_container
    restart: always
    env_file:
      - .env
    ports:
      - "5050:5000" # Host mapping 5050 to avoid port 5000 conflicts on host
    volumes:
      - ./backend:/app
      - /app/node_modules # Prevent overwriting container node_modules
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  # Frontend React Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: accessguard_frontend_container
    restart: always
    ports:
      - "3000:80" # Maps host port 3000 to Nginx port 80 (production)
    # Dev configurations:
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevent overwriting container node_modules
    command: npm run dev -- --host 0.0.0.0 --port 80 # Runs Vite on port 80 for dev mapping
    networks:
      - app-network
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local

networks:
  app-network:
    driver: bridge
